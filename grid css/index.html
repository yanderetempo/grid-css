<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>кубики</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

   
    <div class="all-layouts">

       
        <div class="bento-box layout-5">
            <div class="cube color-red big"></div>
            <div class="cube color-blue"></div>
            <div class="cube color-green"></div>
            <div class="cube color-yellow wide"></div>
            <div class="cube color-purple"></div>
        </div>

        
        <div class="bento-box layout-4">
            <div class="cube color-orange tall"></div>
            <div class="cube color-teal big"></div>
            <div class="cube color-pink"></div>
            <div class="cube color-blue"></div>
            <div class="cube color-green"></div>
        </div>

    
        <div class="bento-box layout-3">
            <div class="cube color-red wide"></div>
            <div class="cube color-yellow"></div>
            <div class="cube color-blue wide"></div>
            <div class="cube color-purple"></div>
            <div class="cube color-green wide"></div>
            <div class="cube color-orange"></div>
        </div>

      
        <div class="bento-box layout-2">
            <div class="cube color-pink"></div>
            <div class="cube color-teal wide"></div>
            <div class="cube color-blue"></div>
            <div class="cube color-orange"></div>
            <div class="cube color-green"></div>
            <div class="cube color-red full"></div>
        </div>

      
        <div class="bento-box layout-1">
            <div class="cube color-blue"></div>
            <div class="cube color-green wide"></div>
            <div class="cube color-yellow wide"></div>
            <div class="cube color-red"></div>
            <div class="cube color-purple full"></div>
        </div>

    </div>

</body>
</html>
